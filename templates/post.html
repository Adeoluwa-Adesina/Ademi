{% extends "base.html" %}

{% block title %}{{ post.title }} — Ademi{% endblock %}

{% block content %}
<div class="post-wrap">

  <nav class="post-nav">
    <a href="/">← All topics</a>
    &nbsp;·&nbsp; {{ post.source_title }}
  </nav>

  <p class="post-meta">Chapter {{ post.chapter_number }}</p>
  <h1 class="post-title">{{ post.title }}</h1>

  {% if post.summary %}
  <p class="post-summary">{{ post.summary }}</p>
  {% endif %}

  <hr class="post-divider">

  <div class="post-body">
    {{ body_html | safe }}
  </div>

</div>
{% endblock %}
