<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ademi{% endblock %}</title>

  <!-- KaTeX — renders $...$ and $$...$$ math client-side -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$',  right: '$',  display: false}
      ]
    });">
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.1rem;
      line-height: 1.75;
      color: #1a1a1a;
      background: #fafaf8;
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    a { color: #1a1a1a; }
    a:hover { color: #555; }

    header { margin-bottom: 3rem; }
    header a { text-decoration: none; }
    header h1 { font-size: 1.3rem; font-weight: normal; letter-spacing: 0.04em; }

    h2 { font-size: 1.3rem; font-weight: bold; margin: 2.5rem 0 0.75rem; }
    h3 { font-size: 1.1rem; font-weight: bold; margin: 2rem 0 0.5rem; }
    p  { margin-bottom: 1.1rem; }

    ul, ol { padding-left: 1.5rem; margin-bottom: 1.1rem; }
    li { margin-bottom: 0.3rem; }

    /* [PAUSE] spacer */
    .pause { height: 2.5rem; }

    /* figures */
    .figure { margin: 2rem 0; text-align: center; }
    .figure__placeholder {
      display: inline-block;
      border: 1px dashed #bbb;
      border-radius: 4px;
      padding: 1.5rem 2rem;
      color: #888;
      font-family: monospace;
      font-size: 0.9rem;
      background: #f5f5f3;
    }
    .figure__caption {
      margin-top: 0.6rem;
      font-size: 0.88rem;
      color: #555;
      font-style: italic;
    }
    .figure img { max-width: 100%; border-radius: 4px; }
    .figure--missing {
      color: #c00;
      font-size: 0.85rem;
      font-family: monospace;
    }

    /* KaTeX display blocks */
    .katex-display { margin: 1.5rem 0; overflow-x: auto; }
  </style>
</head>
<body>
  <header>
    <a href="/"><h1>Ademi</h1></a>
  </header>

  {% block content %}{% endblock %}
</body>
</html>
